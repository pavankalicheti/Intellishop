<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelliShop Admin — Fraud Intelligence Console</title>
    <meta name="description" content="IntelliShop Admin Panel — Enterprise Fraud Detection & Risk Intelligence Dashboard">
    <link rel="icon" type="image/svg+xml" href="favicon-admin.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ═══════════════════════════════════════════════════
           ADMIN DARK THEME — SOC COMMAND CENTER
           ═══════════════════════════════════════════════════ */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');

        :root {
            --bg-deepest: #020617;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-card-hover: #243044;
            --bg-input: #0f172a;
            --border: #334155;
            --border-glow: #06b6d444;
            --text: #f1f5f9;
            --text-muted: #64748b;
            --text-dim: #475569;
            --accent-cyan: #06b6d4;
            --accent-blue: #3b82f6;
            --accent-green: #22c55e;
            --accent-yellow: #eab308;
            --accent-orange: #f97316;
            --accent-red: #ef4444;
            --accent-purple: #a855f7;
            --accent-pink: #ec4899;
            --glass: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(148, 163, 184, 0.1);
            --sidebar-width: 260px;
            --topbar-height: 56px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-deepest);
            color: var(--text);
            line-height: 1.5;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* ═══ LOGIN PAGE ═══ */
        .admin-login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at 30% 20%, rgba(6,182,212,0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(168,85,247,0.06) 0%, transparent 50%),
                        var(--bg-deepest);
        }
        .admin-login-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4), 0 0 80px rgba(6,182,212,0.05);
        }
        .login-logo { text-align: center; margin-bottom: 32px; }
        .login-icon { font-size: 56px; margin-bottom: 12px; filter: drop-shadow(0 0 20px rgba(6,182,212,0.3)); }
        .login-logo h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .login-logo p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
        .login-field { margin-bottom: 18px; }
        .login-field label { display: block; font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 0.5px; text-transform: uppercase; }
        .login-field input {
            width: 100%; padding: 12px 16px; background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 12px; color: var(--text); font-size: 14px; outline: none; transition: all 0.3s;
        }
        .login-field input:focus { border-color: var(--accent-cyan); box-shadow: 0 0 0 3px rgba(6,182,212,0.1); }
        .login-submit {
            width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            border: none; border-radius: 12px; color: #fff; font-size: 14px; font-weight: 700;
            cursor: pointer; transition: all 0.3s; letter-spacing: 0.5px;
        }
        .login-submit:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(6,182,212,0.3); }
        .login-error { text-align: center; color: var(--accent-red); font-size: 12px; margin-top: 12px; padding: 8px; background: rgba(239,68,68,0.1); border-radius: 8px; }
        .login-footer { text-align: center; margin-top: 24px; }
        .login-footer p { font-size: 11px; color: var(--text-dim); }
        .login-hint { margin-top: 4px; color: var(--accent-cyan); font-family: 'JetBrains Mono', monospace; font-size: 10px; }

        /* ═══ ADMIN LAYOUT ═══ */
        .admin-layout { display: flex; min-height: 100vh; }

        /* SIDEBAR */
        .admin-sidebar {
            width: var(--sidebar-width); background: var(--bg-dark); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
            transition: transform 0.3s ease;
        }
        .admin-sidebar.collapsed { transform: translateX(-100%); }
        .sidebar-brand { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); }
        .sidebar-logo { font-size: 28px; display: block; margin-bottom: 4px; }
        .sidebar-title { font-size: 18px; font-weight: 800; display: block; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar-sub { font-size: 10px; color: var(--text-muted); letter-spacing: 1.5px; text-transform: uppercase; }

        .sidebar-nav { flex: 1; padding: 12px 10px; overflow-y: auto; }
        .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 11px 16px; border-radius: 10px;
            color: var(--text-muted); text-decoration: none; font-size: 13px; font-weight: 500;
            transition: all 0.2s; margin-bottom: 3px; position: relative;
        }
        .nav-item:hover { background: var(--bg-card); color: var(--text); }
        .nav-item.active {
            background: linear-gradient(135deg, rgba(6,182,212,0.12), rgba(59,130,246,0.08));
            color: var(--accent-cyan); border: 1px solid rgba(6,182,212,0.2);
        }
        .nav-icon { font-size: 16px; width: 20px; text-align: center; }
        .nav-badge {
            margin-left: auto; font-size: 9px; font-weight: 800; background: var(--accent-red);
            color: #fff; padding: 2px 6px; border-radius: 6px; letter-spacing: 0.5px;
            animation: badgePulse 2s infinite;
        }
        @keyframes badgePulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        .sidebar-footer { padding: 16px; border-top: 1px solid var(--border); }
        .admin-user { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .admin-avatar {
            width: 34px; height: 34px; border-radius: 10px; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px;
        }
        .admin-name { font-size: 13px; font-weight: 600; }
        .admin-email { font-size: 10px; color: var(--text-muted); }
        .logout-btn {
            width: 100%; padding: 8px; background: transparent; border: 1px solid var(--border);
            border-radius: 8px; color: var(--text-muted); font-size: 11px; cursor: pointer; transition: all 0.2s;
        }
        .logout-btn:hover { border-color: var(--accent-red); color: var(--accent-red); }
        .back-to-store {
            display: block; text-align: center; margin-top: 10px; font-size: 11px;
            color: var(--accent-cyan); text-decoration: none; opacity: 0.7;
        }
        .back-to-store:hover { opacity: 1; }

        /* MAIN CONTENT AREA */
        .admin-main { flex: 1; margin-left: var(--sidebar-width); min-height: 100vh; }
        .admin-topbar {
            height: var(--topbar-height); background: var(--bg-dark); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 24px; position: sticky; top: 0; z-index: 50;
            backdrop-filter: blur(12px);
        }
        .sidebar-toggle { background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; margin-right: 16px; display: none; }
        .topbar-title { font-size: 16px; font-weight: 700; }
        .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
        .topbar-time { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-muted); }
        .topbar-status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--accent-green); }
        .pulse-dot {
            width: 8px; height: 8px; border-radius: 50%; background: var(--accent-green);
            animation: pulseDot 2s infinite;
        }
        @keyframes pulseDot { 0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.6); } 70% { box-shadow: 0 0 0 8px transparent; } }

        .admin-content { padding: 24px; min-height: calc(100vh - var(--topbar-height)); }

        /* Loading */
        .page-loading { display: flex; align-items: center; justify-content: center; height: 300px; }
        .loader { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent-cyan); border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ═══ COMMON ADMIN COMPONENTS ═══ */
        .admin-page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
        .admin-page-header h2 { font-size: 22px; font-weight: 800; }
        .page-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
        .header-actions { display: flex; gap: 10px; align-items: center; }
        .admin-search {
            padding: 9px 14px; background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-size: 12px; width: 220px; outline: none;
        }
        .admin-search:focus { border-color: var(--accent-cyan); }
        .admin-select {
            padding: 9px 14px; background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-size: 12px; outline: none;
        }

        /* TABLE */
        .admin-table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); }
        .admin-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .admin-table thead th {
            background: var(--bg-card); padding: 12px 14px; text-align: left; font-weight: 600;
            color: var(--text-muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border); white-space: nowrap;
        }
        .admin-table tbody td { padding: 10px 14px; border-bottom: 1px solid rgba(51,65,85,0.4); vertical-align: middle; }
        .admin-table tbody tr:hover { background: var(--bg-card-hover); }
        .admin-table tbody tr:last-child td { border-bottom: none; }
        .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }
        .amount { font-weight: 600; color: var(--accent-cyan); }
        .text-muted { color: var(--text-muted); }
        .text-danger { color: var(--accent-red); }
        .date-cell { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

        /* BADGES & TAGS */
        .risk-badge {
            display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px;
            font-weight: 700; font-family: 'JetBrains Mono', monospace;
        }
        .risk-critical { background: rgba(239,68,68,0.15); color: var(--accent-red); }
        .risk-high { background: rgba(249,115,22,0.15); color: var(--accent-orange); }
        .risk-medium { background: rgba(234,179,8,0.15); color: var(--accent-yellow); }
        .risk-low { background: rgba(34,197,94,0.15); color: var(--accent-green); }

        .status-tag { padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; }
        .status-delivered { background: rgba(34,197,94,0.1); color: var(--accent-green); }
        .status-shipped { background: rgba(6,182,212,0.1); color: var(--accent-cyan); }
        .status-processing { background: rgba(234,179,8,0.1); color: var(--accent-yellow); }
        .status-flagged { background: rgba(239,68,68,0.15); color: var(--accent-red); border: 1px solid rgba(239,68,68,0.2); }
        .status-cancelled { background: rgba(100,116,139,0.1); color: var(--text-muted); }
        .status-returned { background: rgba(168,85,247,0.1); color: var(--accent-purple); }
        .status-active { background: rgba(34,197,94,0.1); color: var(--accent-green); }
        .status-blocked { background: rgba(239,68,68,0.15); color: var(--accent-red); }
        .status-watchlist { background: rgba(249,115,22,0.15); color: var(--accent-orange); }

        .payment-tag { font-size: 10px; background: var(--bg-dark); padding: 3px 8px; border-radius: 4px; color: var(--text-muted); }
        .category-tag { font-size: 10px; background: rgba(6,182,212,0.1); padding: 3px 8px; border-radius: 4px; color: var(--accent-cyan); }

        .action-btn-sm {
            padding: 4px 12px; border-radius: 6px; font-size: 10px; font-weight: 600;
            background: transparent; border: 1px solid var(--border); color: var(--text-muted);
            cursor: pointer; transition: all 0.2s;
        }
        .action-btn-sm:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }
        .action-btn-sm.danger:hover { border-color: var(--accent-red); color: var(--accent-red); }

        .row-flagged { background: rgba(239,68,68,0.04); }
        .row-watch { background: rgba(249,115,22,0.04); }
        .row-warning { background: rgba(234,179,8,0.03); }

        /* ═══ FRAUD DASHBOARD STYLES ═══ */
        .fraud-dash { }
        .fraud-header {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 24px; flex-wrap: wrap; gap: 16px;
        }
        .fraud-header h2 { font-size: 22px; font-weight: 800; }
        .fraud-header-actions { display: flex; align-items: center; gap: 14px; }
        .system-status {
            display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--accent-green);
            background: rgba(34,197,94,0.08); padding: 6px 14px; border-radius: 8px; border: 1px solid rgba(34,197,94,0.15);
        }
        .attack-btn {
            padding: 10px 20px; background: linear-gradient(135deg, #dc2626, #991b1b);
            border: 1px solid rgba(239,68,68,0.3); border-radius: 10px; color: #fff; font-size: 12px;
            font-weight: 700; cursor: pointer; transition: all 0.3s; letter-spacing: 0.3px;
        }
        .attack-btn:hover { box-shadow: 0 0 25px rgba(239,68,68,0.3); transform: translateY(-1px); }
        .attack-btn.attack-active {
            background: linear-gradient(135deg, #16a34a, #166534);
            border-color: rgba(34,197,94,0.3);
            animation: attackPulse 1s infinite;
        }
        @keyframes attackPulse { 0%, 100% { box-shadow: 0 0 10px rgba(239,68,68,0.2); } 50% { box-shadow: 0 0 25px rgba(239,68,68,0.5); } }

        /* THREAT METER */
        .threat-section { margin-bottom: 24px; }
        .threat-meter-card {
            background: var(--glass); backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 16px; padding: 24px 32px;
            display: flex; align-items: center; gap: 40px; justify-content: center;
            transition: all 0.5s ease;
        }
        .threat-meter-card.threat-pulse {
            animation: threatPulseAnim 1.5s infinite;
        }
        @keyframes threatPulseAnim {
            0%, 100% { box-shadow: 0 0 20px rgba(239,68,68,0.1); }
            50% { box-shadow: 0 0 40px rgba(239,68,68,0.3); }
        }
        .gauge-container { width: 200px; }
        .gauge-svg { width: 100%; }
        .gauge-arc { transition: stroke-dashoffset 0.8s ease; }
        .gauge-needle { transition: transform 0.8s ease; transform-origin: 100px 100px; }
        .gauge-labels { display: flex; justify-content: space-between; font-size: 8px; font-weight: 700; letter-spacing: 0.5px; margin-top: -10px; padding: 0 10px; }
        .g-low { color: var(--accent-green); }
        .g-elev { color: var(--accent-yellow); }
        .g-high { color: var(--accent-orange); }
        .g-crit { color: var(--accent-red); }
        .threat-info { text-align: center; }
        .threat-score { font-size: 56px; font-weight: 900; font-family: 'JetBrains Mono', monospace; transition: color 0.5s; }
        .threat-label { font-size: 16px; font-weight: 700; margin-top: 4px; }
        .threat-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

        /* KPI CARDS */
        .kpi-section { margin-bottom: 24px; }
        .kpi-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
        .kpi-card {
            background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--glass-border);
            border-radius: 14px; padding: 18px; transition: all 0.3s;
        }
        .kpi-card:hover { border-color: var(--border-glow); box-shadow: 0 0 20px rgba(6,182,212,0.06); transform: translateY(-2px); }
        .kpi-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .kpi-label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
        .sparkline-canvas { border-radius: 4px; }
        .kpi-value { font-size: 28px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
        .kpi-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

        /* PANEL CONTAINERS */
        .fraud-panel {
            background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--glass-border);
            border-radius: 16px; padding: 20px; margin-bottom: 20px; overflow: hidden;
            display: flex; flex-direction: column;
        }
        .fraud-panel canvas {
            max-width: 100% !important;
            max-height: 100% !important;
        }
        .panel-title { font-size: 14px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .fraud-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 0; align-items: start; }

        /* ACTIVITY FEED */
        .panel-feed { }
        .feed-list { max-height: 420px; overflow-y: auto; }
        .feed-row {
            padding: 12px; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px;
            border-left: 3px solid var(--accent-cyan); transition: all 0.3s; background: rgba(15,23,42,0.5);
        }
        .feed-row:hover { background: var(--bg-card-hover); }
        .feed-row.feed-attack {
            background: rgba(239,68,68,0.08); border-color: var(--accent-red);
            animation: feedAttack 0.5s ease;
        }
        @keyframes feedAttack { 0% { box-shadow: 0 0 20px rgba(239,68,68,0.4); } 100% { box-shadow: none; } }
        @keyframes feedSlideIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .feed-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
        .feed-time { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); }
        .feed-user { font-size: 11px; font-weight: 600; color: var(--accent-cyan); }
        .feed-action { font-size: 11px; color: var(--text-muted); }
        .feed-risk { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; }
        .feed-severity { font-size: 9px; font-weight: 800; padding: 1px 5px; border-radius: 3px; letter-spacing: 0.5px; }
        .sev-critical { background: rgba(239,68,68,0.15); color: var(--accent-red); }
        .sev-high { background: rgba(249,115,22,0.15); color: var(--accent-orange); }
        .sev-medium { background: rgba(234,179,8,0.15); color: var(--accent-yellow); }
        .sev-low { background: rgba(6,182,212,0.15); color: var(--accent-cyan); }
        .feed-reason { font-size: 11px; color: var(--text); margin-bottom: 4px; }
        .feed-meta { font-size: 10px; color: var(--text-dim); margin-bottom: 6px; }
        .feed-actions { display: flex; gap: 6px; }
        .feed-btn {
            padding: 3px 10px; border-radius: 5px; font-size: 9px; font-weight: 600;
            border: 1px solid var(--border); background: transparent; cursor: pointer; transition: all 0.2s;
        }
        .feed-btn.review { color: var(--accent-cyan); }
        .feed-btn.review:hover { background: rgba(6,182,212,0.1); border-color: var(--accent-cyan); }
        .feed-btn.block { color: var(--accent-red); }
        .feed-btn.block:hover { background: rgba(239,68,68,0.1); border-color: var(--accent-red); }
        .feed-btn.whitelist { color: var(--accent-green); }
        .feed-btn.whitelist:hover { background: rgba(34,197,94,0.1); border-color: var(--accent-green); }
        .feed-btn.escalate { color: var(--accent-orange); }
        .feed-btn.escalate:hover { background: rgba(249,115,22,0.1); border-color: var(--accent-orange); }

        /* HEATMAP */
        .heatmap-container { overflow-x: auto; }
        .heatmap-row { display: flex; align-items: center; gap: 2px; margin-bottom: 2px; }
        .heatmap-header { margin-bottom: 4px; }
        .heatmap-day-label { width: 32px; font-size: 9px; color: var(--text-muted); font-weight: 600; flex-shrink: 0; text-align: right; padding-right: 6px; }
        .heatmap-hour-label { width: 18px; font-size: 7px; color: var(--text-dim); text-align: center; flex-shrink: 0; }
        .heatmap-cell {
            width: 18px; height: 18px; border-radius: 3px; flex-shrink: 0;
            cursor: pointer; transition: all 0.2s; border: 1px solid transparent;
        }
        .heatmap-cell:hover { border-color: var(--accent-cyan); transform: scale(1.3); z-index: 5; }

        /* RISK DISTRIBUTION */
        .risk-dist-chart { display: flex; align-items: flex-end; gap: 6px; height: 170px; padding: 10px 0; }
        .risk-bar-col { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .risk-bar { width: 100%; border-radius: 4px 4px 0 0; transition: all 0.4s ease; min-height: 4px; }
        .risk-bar-label { font-size: 8px; color: var(--text-dim); margin-top: 4px; font-weight: 600; }
        .threshold-control { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
        .threshold-control label { font-size: 12px; color: var(--text-muted); }
        .threshold-control label strong { color: var(--accent-red); font-family: 'JetBrains Mono', monospace; }
        .threshold-slider {
            width: 100%; margin: 10px 0; -webkit-appearance: none; height: 6px;
            background: linear-gradient(to right, var(--accent-green), var(--accent-yellow), var(--accent-red));
            border-radius: 3px; outline: none;
        }
        .threshold-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 18px; height: 18px; background: #fff;
            border-radius: 50%; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .threshold-info { display: flex; justify-content: space-between; font-size: 11px; }
        .threshold-info strong { color: var(--accent-red); font-family: 'JetBrains Mono', monospace; }

        /* GEO MAP */
        .geo-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .india-map-placeholder {
            position: relative; width: 100%; height: 360px;
            background: radial-gradient(ellipse, rgba(6,182,212,0.04), transparent);
            border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
        }
        .geo-bubble {
            position: absolute; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            transition: transform 0.3s; cursor: pointer; animation: geoPulse 3s infinite;
        }
        .geo-bubble:hover { transform: scale(1.4); z-index: 10; }
        @keyframes geoPulse { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }
        .geo-label { font-size: 7px; font-weight: 800; color: #fff; }
        .geo-table-wrap { overflow-y: auto; max-height: 360px; }
        .geo-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .geo-table thead th { padding: 8px 10px; text-align: left; font-size: 9px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        .geo-table tbody td { padding: 7px 10px; border-bottom: 1px solid rgba(51,65,85,0.3); }
        .geo-table tbody tr:hover { background: var(--bg-card-hover); }

        /* DEVICE PANEL */
        .device-table-wrap { overflow-x: auto; max-height: 400px; overflow-y: auto; }
        .device-flags { display: flex; gap: 4px; flex-wrap: wrap; }
        .dev-flag {
            font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 600; white-space: nowrap;
        }
        .flag-vpn { background: rgba(239,68,68,0.12); color: #fca5a5; }
        .flag-multi { background: rgba(249,115,22,0.12); color: #fdba74; }
        .flag-headless { background: rgba(234,179,8,0.12); color: #fde047; }

        /* BLOCKED/WATCHLIST TABS */
        .blocked-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
        .tab-btn {
            padding: 8px 18px; border-radius: 8px; border: 1px solid var(--border);
            background: transparent; color: var(--text-muted); font-size: 12px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .tab-btn.active { background: var(--accent-cyan); color: #fff; border-color: var(--accent-cyan); }

        /* ═══ SALES PAGE STYLES ═══ */
        .kpi-grid-sales { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
        .sales-kpi {
            background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--glass-border);
            border-radius: 14px; padding: 20px; text-align: center;
        }
        .sales-kpi-label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 8px; }
        .sales-kpi-value { font-size: 28px; font-weight: 800; color: var(--accent-cyan); font-family: 'JetBrains Mono', monospace; }
        .sales-charts-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; }
        .chart-card {
            background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--glass-border);
            border-radius: 16px; padding: 20px;
        }
        .chart-card h3 { font-size: 14px; margin-bottom: 16px; color: var(--text); }
        .top-products-list { }
        .top-product-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid rgba(51,65,85,0.3); }
        .top-rank { font-weight: 800; color: var(--accent-cyan); font-size: 12px; width: 24px; }
        .top-name { font-size: 12px; width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .top-bar-wrap { flex: 1; height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; }
        .top-bar { height: 100%; background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue)); border-radius: 3px; transition: width 0.6s ease; }
        .top-revenue { font-size: 12px; font-weight: 700; color: var(--accent-cyan); font-family: 'JetBrains Mono', monospace; }
        .top-sold { font-size: 10px; }

        /* ═══ SETTINGS ═══ */
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .settings-card {
            background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--glass-border);
            border-radius: 16px; padding: 24px;
        }
        .settings-card h3 { font-size: 15px; margin-bottom: 18px; }
        .settings-field { margin-bottom: 14px; }
        .settings-field label { display: block; font-size: 11px; color: var(--text-muted); font-weight: 600; margin-bottom: 6px; }
        .admin-input {
            width: 100%; padding: 10px 14px; background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-size: 13px; outline: none;
        }
        .admin-input:focus { border-color: var(--accent-cyan); }
        .admin-range { width: 100%; }
        .admin-btn {
            padding: 10px 20px; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            border: none; border-radius: 8px; color: #fff; font-size: 12px; font-weight: 700;
            cursor: pointer; transition: all 0.2s;
        }
        .admin-btn:hover { box-shadow: 0 4px 15px rgba(6,182,212,0.3); }
        .admin-btn.danger { background: linear-gradient(135deg, var(--accent-red), #991b1b); }
        .toggle-label { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text); cursor: pointer; }

        /* ═══ RESPONSIVE ═══ */
        @media (max-width: 1200px) {
            .kpi-grid { grid-template-columns: repeat(3, 1fr); }
            .fraud-row-2 { grid-template-columns: 1fr; }
            .geo-layout { grid-template-columns: 1fr; }
            .sales-charts-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 900px) {
            .admin-sidebar { transform: translateX(-100%); }
            .admin-sidebar.show { transform: translateX(0); }
            .admin-main { margin-left: 0; }
            .sidebar-toggle { display: block; }
            .kpi-grid { grid-template-columns: repeat(2, 1fr); }
            .kpi-grid-sales { grid-template-columns: repeat(2, 1fr); }
            .settings-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 600px) {
            .kpi-grid { grid-template-columns: 1fr; }
            .admin-content { padding: 12px; }
            .threat-meter-card { flex-direction: column; gap: 16px; }
        }
    </style>
</head>
